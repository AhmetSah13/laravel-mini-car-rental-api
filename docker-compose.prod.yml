name: mini-car-rental-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: mini-car-rental-backend-prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - production
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  reverb:
    image: mini-car-rental-backend-prod
    restart: unless-stopped
    env_file:
      - .env.production
    command: ["php", "artisan", "reverb:start"]
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - production
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 8081) ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-changeme-reverb-key}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-127.0.0.1}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-80}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    image: mini-car-rental-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_started
    networks:
      - production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data
    networks:
      - production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  production:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:
  app_storage:
